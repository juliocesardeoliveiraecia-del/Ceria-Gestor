<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CERIA Gestor</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #0a0f1c;
  color: white;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: #0c1324;
  height: 100vh;
  padding: 20px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 30px;
}

.logo img {
  width: 40px;
}

.logo span {
  font-weight: 600;
  color: #4da3ff;
}

.menu div {
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 10px;
}

.menu div:hover {
  background: rgba(77,163,255,0.1);
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

/* DASHBOARD */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 15px;
}

.card {
  background: #121a2f;
  padding: 20px;
  border-radius: 12px;
}

.card h2 {
  margin-top: 10px;
}

/* ALERT */
.alert {
  margin-top: 15px;
  background: #1c253b;
  padding: 15px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}

button {
  background: orange;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  color: white;
}

/* PDV */
.pdv {
  display: none;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px,1fr));
  gap: 10px;
}

.product {
  background: #16213a;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  text-align: center;
}

.product:hover {
  background: #1f2c4d;
}

.cart {
  margin-top: 20px;
  background: #121a2f;
  padding: 15px;
  border-radius: 10px;
}

</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">
    <img src="https://via.placeholder.com/40" />
    <span>CERIA</span>
  </div>

  <div class="menu">
    <div onclick="showScreen('dashboard')">Dashboard</div>
    <div onclick="showScreen('pdv')">Caixa / PDV</div>
  </div>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="header">
    <h2>Dashboard</h2>
  </div>

  <div class="cards">
    <div class="card">
      <p>Vendas hoje</p>
      <h2 id="sales">R$ 0</h2>
    </div>

    <div class="card">
      <p>Pedidos</p>
      <h2 id="orders">0</h2>
    </div>
  </div>

  <div class="alert">
    <span>Você pode aumentar suas vendas com combos</span>
    <button onclick="alert('Sugestão ativada')">Ativar</button>
  </div>
</div>

<!-- PDV -->
<div id="pdv" class="pdv">
  <h2>Caixa / PDV</h2>

  <div class="products">
    <div class="product" onclick="addItem('Hambúrguer',20)">🍔 Hambúrguer</div>
    <div class="product" onclick="addItem('Refrigerante',6)">🥤 Refri</div>
    <div class="product" onclick="addItem('Batata',10)">🍟 Batata</div>
  </div>

  <div class="cart">
    <h3>Pedido</h3>
    <div id="cartItems"></div>
    <h3>Total: R$ <span id="total">0</span></h3>
    <button onclick="checkout()">Finalizar Venda</button>
  </div>
</div>

</div>

<script>
let total = 0;
let orders = 0;

function showScreen(screen) {
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('pdv').style.display = 'none';
  document.getElementById(screen).style.display = 'block';
}

function addItem(name, price) {
  total += price;
  document.getElementById('total').innerText = total;

  const item = document.createElement('div');
  item.innerText = name + " - R$" + price;
  document.getElementById('cartItems').appendChild(item);
}

function checkout() {
  orders++;
  document.getElementById('orders').innerText = orders;
  document.getElementById('sales').innerText = "R$ " + total;

  alert("Venda finalizada!");

  total = 0;
  document.getElementById('total').innerText = 0;
  document.getElementById('cartItems').innerHTML = "";
}
</script>

</body>
</html>
