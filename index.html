<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CERIA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: radial-gradient(circle at center, #0a0f1f, #02040a);
  font-family: 'Inter', sans-serif;
  color: white;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  height: 100vh;
  background: linear-gradient(180deg, #05070d, #02040a);
  border-right: 1px solid rgba(0, 150, 255, 0.1);
  padding: 30px;
}

.logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 22px;
  color: #5cc8ff;
  text-shadow: 0 0 20px rgba(92,200,255,0.9);
  margin-bottom: 40px;
}

.menu div {
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 12px;
  transition: 0.3s;
  cursor: pointer;
}

.menu div:hover {
  background: rgba(0,150,255,0.1);
  box-shadow: 0 0 15px rgba(0,150,255,0.4);
}

/* MAIN */
.main {
  flex: 1;
  padding: 40px;
}

.title {
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 30px;
}

/* CARDS */
.cards {
  display: flex;
  gap: 25px;
}

.card {
  flex: 1;
  padding: 25px;
  border-radius: 20px;
  background: linear-gradient(145deg, rgba(10,15,30,0.8), rgba(5,8,18,0.8));
  border: 1px solid rgba(0, 180, 255, 0.2);
  box-shadow:
    0 0 20px rgba(0,180,255,0.1),
    inset 0 0 20px rgba(0,180,255,0.05);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow:
    0 0 30px rgba(0,180,255,0.3),
    inset 0 0 20px rgba(0,180,255,0.1);
}

.card p {
  color: #8fa3c7;
}

.card h2 {
  margin-top: 10px;
  font-size: 28px;
}

/* ALERTAS */
.alert {
  margin-top: 25px;
  padding: 20px;
  border-radius: 15px;
  background: linear-gradient(145deg, rgba(20,25,40,0.8), rgba(10,12,20,0.8));
  border: 1px solid rgba(255,140,0,0.3);
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 0 20px rgba(255,140,0,0.1);
}

button {
  background: linear-gradient(135deg, #ff6a00, #ffb347);
  border: none;
  padding: 10px 18px;
  border-radius: 12px;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px rgba(255,140,0,0.6);
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">CERIA</div>

  <div class="menu">
    <div>Dashboard</div>
    <div>Caixa</div>
    <div>Mesas</div>
    <div>Pedidos</div>
    <div>Delivery</div>
    <div>Produtos</div>
    <div>Clientes</div>
    <div>Campanhas</div>
  </div>
</div>

<div class="main">
  <div class="title">Dashboard</div>

  <div class="cards">
    <div class="card">
      <p>Vendas hoje</p>
      <h2>R$ 2.430</h2>
    </div>

    <div class="card">
      <p>Ticket médio</p>
      <h2>R$ 32</h2>
    </div>

    <div class="card">
      <p>Pedidos</p>
      <h2>78</h2>
    </div>
  </div>

  <div class="alert">
    <span>🔥 Você perdeu R$ 320 sem upsell hoje</span>
    <button>Ativar</button>
  </div>

  <div class="alert">
    <span>📢 12 clientes podem voltar hoje</span>
    <button>Reativar</button>
  </div>

</div>

</body>
</html>
